setup_messages:
  team:
    usage: "{prefix} <red>Usage:</red> <yellow>/baa game <id> battle_royale team <count|size> <value></yellow>"
    success: "{prefix} <green>Team {setting} set to {value} for {game} in arena {arena_id}.</green>"
    invalid_limit: "{prefix} <red>Team configuration exceeds arena max players ({max_players}).</red>"
    invalid_value: "{prefix} <red>Team {setting} must be greater than 0.</red>"
    invalid_count: "{prefix} <red>Team count must be at least 2.</red>"
  region:
    usage: "{prefix} <red>Usage:</red> <yellow>/baa game <id> battle_royale region <set|clear></yellow>"
    must_use_stick: "{prefix} <red>Select two corners with the setup tool first.</red>"
    set: "{prefix} <green>Regeneration region saved.</green> <gray>Blocks:</gray> <white>{blocks}</white> <gray>({x}x{y}x{z})</gray>"
    cleared: "{prefix} <yellow>Regeneration region cleared.</yellow> <gray>Note: Block placement/breaking will be disabled without a region.</gray>"
