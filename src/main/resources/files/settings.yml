# Battle Royale Module Settings

# Visual representation in menus
menus:
  vote:
    item: "DRAGON_HEAD"

game:
  # Set to 0 to disable a time limit
  time_limit_seconds: 0

drop:
  enabled: true
  # Height for the dragon flight path.
  # If it exceeds the arena Y-bounds, the module will clamp it inside them.
  flight_height: 120
  # Movement speed (blocks per tick)
  speed_blocks_per_tick: 0.6
  # Ticks between plane position updates; larger values let the
  # BlockDisplay client-side interpolation smooth the movement.
  # Effective step size is speed_blocks_per_tick * interpolation_ticks.
  interpolation_ticks: 5
  # Ignore plane-exit sneaks for a brief moment after boarding so
  # stale crouch state from the lobby cannot throw players off.
  exit_grace_ticks: 10
  # Offset from the arena edge when spawning the dragon path
  edge_offset: 4.0
  # Half-size for the dragon flight path
  default_half_size: 80

combat:
  kill_regeneration:
    # Health restored on eliminations (set to 0 to disable)
    health: 6.0

# Game items (optional)
items:
  # Items to give players on game start
  # Format: MATERIAL:AMOUNT:SLOT
  starting_items: []

# Potion effects (optional)
effects:
  # Effects to give players during the game
  # Format: EFFECT_TYPE:DURATION_TICKS:AMPLIFIER
  starting_effects:
    - "DAMAGE_RESISTANCE:60:1"

storm:
  enabled: true
  # If players escape the play area, teleport them back to safety
  prevent_escape: true
  # Default radius for the storm
  default_radius: 80
  # Standby time (in seconds) between storm movements
  standby_seconds: 10
  # Announce upcoming storm movement in chat
  announce_incoming: true
  # Announce when the storm starts moving
  announce_moving: true
  lightning:
    enabled: true
    interval_seconds: 3
    strikes_per_wave: 3
  # Format per stage: "RADIUS_PERCENT:DURATION_SECONDS:DAMAGE_PER_SECOND[:STANDBY_SECONDS]"
  stages:
    - "1.0:40:0.0"
    - "0.7:45:1.0"
    - "0.45:40:2.0"
    - "0.25:35:3.0"
    - "0.0:20:4.0"

loot:
  chests:
    search:
      blocks_per_tick: 1500
    item_count:
      min: 3
      max: 6
    # Format: MATERIAL:MIN_AMOUNT:MAX_AMOUNT:WEIGHT
    items:
      - "STICK:1:1:28"
      - "STRING:1:3:22"
      - "FLINT:1:2:18"
      - "LEATHER:1:2:16"
      - "ROTTEN_FLESH:1:3:16"
      - "WOODEN_SWORD:1:1:15"
      - "STONE_SWORD:1:1:12"
      - "IRON_SWORD:1:1:6"
      - "BOW:1:1:10"
      - "ARROW:2:6:18"
      - "CROSSBOW:1:1:5"
      - "SHIELD:1:1:5"
      - "GOLDEN_APPLE:1:2:8"
      - "COOKED_BEEF:4:8:12"
      - "IRON_HELMET:1:1:6"
      - "IRON_CHESTPLATE:1:1:4"
      - "IRON_LEGGINGS:1:1:4"
      - "IRON_BOOTS:1:1:6"
  special_chests:
    item_count:
      min: 4
      max: 8
    # Format: MATERIAL:MIN_AMOUNT:MAX_AMOUNT:WEIGHT
    items:
      - "DIAMOND_SWORD:1:1:6"
      - "DIAMOND_AXE:1:1:5"
      - "DIAMOND_HELMET:1:1:4"
      - "DIAMOND_CHESTPLATE:1:1:3"
      - "DIAMOND_LEGGINGS:1:1:3"
      - "DIAMOND_BOOTS:1:1:4"
      - "BOW:1:1:8"
      - "ARROW:8:16:10"
      - "GOLDEN_APPLE:2:4:8"
      - "ENCHANTED_GOLDEN_APPLE:1:1:1"
      - "ENDER_PEARL:1:2:6"
      - "COOKED_BEEF:6:10:6"
